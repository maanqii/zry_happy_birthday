<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boyfriend Qualification Exam // 年度测评</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        /* =========================================
           极致梦幻的 UI 美学设定
           ========================================= */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; height: 100%; 
            background-color: #010008; 
            color: #f0f4ff; 
            font-family: 'Helvetica Neue', -apple-system, BlinkMacSystemFont, Arial, sans-serif; 
            overflow: hidden; 
        }

        #webgl-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
        }

        #main-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center; z-index: 10;
            pointer-events: none; 
        }

        .app-frame {
            width: 100%; max-width: 402px; height: 874px; max-height: 100vh;
            padding: 30px 20px; display: flex; flex-direction: column; justify-content: center;
            pointer-events: auto; position: relative;
        }

        /* 判卷系统提示弹窗 (Toast) */
        .toast-message {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(200, 150, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 158, 230, 0.4);
            padding: 15px 25px;
            border-radius: 16px;
            color: #fff;
            font-size: 0.95rem;
            line-height: 1.6;
            letter-spacing: 1px;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            text-align: center;
            white-space: pre-wrap;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            font-weight: 300;
            width: 85%;
        }

        .glass-panel {
            background: linear-gradient(180deg, rgba(20, 25, 45, 0.2) 0%, rgba(10, 10, 25, 0.4) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 1px 20px rgba(255, 255, 255, 0.03);
            padding: 40px 25px;
            position: relative;
            text-align: center;
        }

        .glass-panel::before {
            content: ''; position: absolute; top: -1px; left: 20%; width: 60%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(200, 150, 255, 0.8), transparent);
            box-shadow: 0 0 15px rgba(200, 150, 255, 0.5);
        }

        .question-label {
            color: #bfaaff; 
            font-size: 0.75rem; letter-spacing: 3px; margin-bottom: 20px; display: block;
            text-transform: uppercase; font-weight: 300; opacity: 0.8;
        }
        
        .question { 
            font-size: 1.25rem; font-weight: 300; line-height: 1.6; margin-bottom: 30px;
            color: #ffffff; letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }
        
        .options { display: flex; flex-direction: column; gap: 12px; }
        
        button { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.06); 
            color: #d8d8f0; 
            padding: 15px; font-size: 0.9rem; font-weight: 300;
            letter-spacing: 1px; border-radius: 12px;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
            position: relative; overflow: hidden;
            text-align: left;
        }
        
        button:hover, button:active { 
            background: rgba(200, 150, 255, 0.15); 
            border-color: rgba(200, 150, 255, 0.4); 
            color: #fff;
            box-shadow: 0 10px 25px rgba(10, 0, 20, 0.5), 0 0 15px rgba(200, 150, 255, 0.2);
            transform: translateY(-2px);
        }

        #final-screen { display: none; }
        .heart-icon {
            font-size: 3.5rem; color: #ff9ee6; 
            margin-bottom: 10px;
            animation: breathe 2.5s infinite ease-in-out;
            filter: drop-shadow(0 0 20px rgba(255, 158, 230, 0.6));
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; filter: drop-shadow(0 0 15px rgba(255, 158, 230, 0.4)); }
            50% { transform: scale(1.1); opacity: 1; filter: drop-shadow(0 0 30px rgba(255, 158, 230, 0.8)); }
        }
        .glow-text {
            color: #fff; text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            font-size: 2.2rem; margin-top: 5px; letter-spacing: 2px; font-weight: 300;
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 0.95rem; color: #aeb5d1; margin-top: 15px; line-height: 1.8; font-weight: 300;
        }

        .ambient-text {
            position: absolute; font-size: 0.65rem; color: rgba(255,255,255,0.3); 
            letter-spacing: 2px; pointer-events: none; text-transform: uppercase;
        }
        .hud-top { top: 30px; width: 100%; text-align: center; }
        .hud-bottom { bottom: 30px; width: 100%; text-align: center; }
    </style>
</head>
<body>

    <div id="webgl-container"></div>

    <div id="main-container">
        <div class="app-frame">
            
            <div class="ambient-text hud-top">
                [ QUALIFICATION EXAM IN PROGRESS ]
            </div>
            
            <div id="toast" class="toast-message"></div>

            <div class="glass-panel" id="panel">
                <div id="question-screen">
                    <span class="question-label" id="q-label"></span>
                    <div class="question" id="question-text"></div>
                    <div class="options" id="options-container">
                        </div>
                </div>

                <div id="final-screen">
                    <div class="heart-icon">❤</div>
                    <span class="question-label">EXAM_PASSED // 满分通过</span>
                    <h2 class="glow-text">🎂 生日快乐</h2>
                    <div class="subtitle" id="final-message">
                        恭喜你通过《男朋友年度资格考试》。<br>
                        本次考试得分：<strong style="color:#ff9ee6;">100分</strong>。<br>
                        <span style="font-size: 0.8rem; color: #aeb5d1;">（其实不管答多少都是100分。）</span><br><br>
                        
                        <strong style="color: #e0d0ff; font-weight: 400; font-size: 1.15rem; line-height: 1.8;">
                            谢谢你出生<br>也谢谢你来到我的生活里
                        </strong><br><br>
                        
                        接下来的一年：<br>
                        希望你少加班，多多开心，<br>
                        身体健康，天天吃好睡好，<br>
                        天天幸福<br><br>
                        
                        <span style="color: #ff9ee6; letter-spacing: 2px; font-size: 1.2rem;">来自爱你的MAQ ❤️</span>
                    </div>
                </div>
            </div>

            <div class="ambient-text hud-bottom">
                STATUS: ANALYZING RESPONSES
            </div>
        </div>
    </div>

    <script>
        /* =========================================
           PART 1: 梦幻宇宙渲染引擎 (Three.js)
           ========================================= */
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x010008, 0.0015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 3000);
        camera.position.set(0, 0, 800);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
        container.appendChild(renderer.domElement);

        function createGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.2, 'rgba(255, 255, 255, 0.8)');
            gradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.2)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }
        const glowTexture = createGlowTexture();

        // 星云
        const nebulaCount = 8000;
        const nebulaGeo = new THREE.BufferGeometry();
        const nebulaPos = new Float32Array(nebulaCount * 3);
        const nebulaColors = new Float32Array(nebulaCount * 3);

        const colorPurple = new THREE.Color(0x3a0ca3); 
        const colorPink = new THREE.Color(0x7209b7);   
        const colorCyan = new THREE.Color(0x4361ee);   

        for(let i=0; i<nebulaCount; i++) {
            const r = 800 + Math.random() * 1200;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            
            nebulaPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
            nebulaPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            nebulaPos[i*3+2] = r * Math.cos(phi);

            const mix = Math.random();
            let finalColor;
            if(mix < 0.33) finalColor = colorPurple;
            else if(mix < 0.66) finalColor = colorPink;
            else finalColor = colorCyan;

            nebulaColors[i*3] = finalColor.r;
            nebulaColors[i*3+1] = finalColor.g;
            nebulaColors[i*3+2] = finalColor.b;
        }
        nebulaGeo.setAttribute('position', new THREE.BufferAttribute(nebulaPos, 3));
        nebulaGeo.setAttribute('color', new THREE.BufferAttribute(nebulaColors, 3));

        const nebulaMat = new THREE.PointsMaterial({
            size: 80, 
            map: glowTexture, transparent: true, opacity: 0.15,
            vertexColors: true, blending: THREE.AdditiveBlending, depthWrite: false
        });
        const nebula = new THREE.Points(nebulaGeo, nebulaMat);
        scene.add(nebula);

        // 数据流流星
        const starCount = 3000;
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(starCount * 3);
        const starVels = []; 

        for(let i=0; i<starCount; i++) {
            const r = 50 + Math.random() * 800;
            const theta = Math.random() * Math.PI * 2;
            starPos[i*3] = r * Math.cos(theta);
            starPos[i*3+1] = r * Math.sin(theta);
            starPos[i*3+2] = Math.random() * 2000 - 1000; 
            starVels.push(1.5 + Math.random() * 2.5); 
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));

        const starMat = new THREE.PointsMaterial({
            size: 6, map: glowTexture, transparent: true, opacity: 0.8, color: 0xffffff,
            blending: THREE.AdditiveBlending, depthWrite: false
        });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        let travelSpeed = 1; 
        let mouseX = 0; let mouseY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        });
        document.addEventListener('touchmove', (e) => {
            mouseX = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
        });

        function animate() {
            requestAnimationFrame(animate);
            nebula.rotation.z -= 0.0005;
            nebula.rotation.x += 0.0002;

            const positions = starGeo.attributes.position.array;
            for(let i=0; i<starCount; i++) {
                positions[i*3+2] += starVels[i] * travelSpeed;
                if(positions[i*3+2] > 900) { positions[i*3+2] = -1500; }
            }
            starGeo.attributes.position.needsUpdate = true;

            camera.position.x += (mouseX * 40 - camera.position.x) * 0.02;
            camera.position.y += (mouseY * 40 - camera.position.y) * 0.02;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });


        /* =========================================
           PART 2: 题库编排与逻辑
           ========================================= */
        const questions = [
            // --- 第一部分：男友生存测试 ---
            {
                label: "Part 01 // 男友生存测试",
                q: "Q1. 如果MAQ和一只黑天鹅同时掉进水里，你会先救谁？",
                opts: ["A. 黑天鹅（保护野生动物）", "B. 安琪", "C. 先拍照发朋友圈"],
                toast: "系统判卷：正确答案是 C\n（解析：会拍到MAQ抱着黑天鹅不撒手的奇景。）"
            },
            {
                label: "Part 01 // 男友生存测试",
                q: "Q2. 以下哪个最危险？",
                opts: ["A. 半夜十二点的鬼", "B. 领导的微信消息", "C. MAQ说“没事”"],
                toast: "系统判卷：正确答案是 A\n（警告：因为出题人真的害怕鬼。）"
            },
            {
                label: "Part 01 // 男友生存测试",
                q: "Q3. MAQ说“你去忙吧”，真实含义是：",
                opts: ["A. 我真的希望你去忙", "B. 我随口一说", "C. 你最好别真去"],
                toast: "系统判卷：错误！\n正确答案：视当天心情而定。"
            },
            {
                label: "Part 01 // 男友生存测试",
                q: "Q4. 如果恋爱是一款游戏，ZRY属于：",
                opts: ["A. 新手教程", "B. 普通副本", "C. 地狱难度隐藏BOSS", "D. 通关奖励"],
                toast: "系统判卷：正确答案 C&D\n（因为ZRY是一个谜团又是一个奖励）"
            },
            {
                label: "Part 01 // 男友生存测试",
                q: "Q5. 以下哪个技能最有用？",
                opts: ["A. 年薪百万", "B. 八块腹肌", "C. 识别MAQ的表情变化"],
                toast: "系统判卷：正确答案 反正不是C\n（解析：MAQ的表情多好懂啊！）"
            },
            
            // --- 第二部分：恋爱理解测试 ---
            {
                label: "Part 02 // 恋爱理解测试",
                q: "Q6. 异地恋最大的BUG是什么？",
                opts: ["A. 距离", "B. 时间", "C. 想对方的时候只能发表情包"],
                toast: "系统判卷：正确答案 C（解析：好惨哦...）"
            },
            {
                label: "Part 02 // 恋爱理解测试",
                q: "Q7. 男朋友最大的作用是什么？",
                opts: ["A. 提供情绪价值", "B. 提供精神陪伴", "C. 提供身体价值", "D. 以上都是"],
                toast: "系统判卷：正确答案 D（解析：但听说男生过了25就是60，C可怎么办...）"
            },
            {
                label: "Part 02 // 恋爱理解测试",
                q: "Q8. 如果未来出现时光机，你最应该做什么？",
                opts: ["A. 买比特币", "B. 买彩票", "C. 早点认识MAQ"],
                toast: "系统判卷：正确答案 A&B\n（解析：登上福布斯富豪榜的话无论如何都会认识的。）"
            },

            // --- 第三部分：越来越离谱 ---
            {
                label: "Part 03 // 终极考验",
                q: "Q9. 为什么汽车/高铁要发明得这么快？",
                opts: ["A. 科技进步", "B. 国家发展", "C. 为了让ZRY快点回MAQ身边"],
                toast: "系统判卷：正确答案 C（解析：但汽车还是别开太快了！）"
            },
            {
                label: "Part 03 // 终极考验",
                q: "Q10. 以下哪项属于男朋友义务？",
                opts: ["A. 亲亲", "B. 抱抱", "C. 夸夸", "D. 全部"],
                toast: "系统判卷：正确答案 D"
            },
            {
                label: "Part 03 // 终极考验",
                q: "Q11. 为什么人一周只能休两天？",
                opts: ["A. 大自然守则", "B. 国家规定", "C. ACG对异地恋的恶意"],
                toast: "系统判卷：正确答案 C"
            },
            {
                label: "Part 03 // 终极考验",
                q: "Q12. 请判断：MAQ每天都很讲道理。",
                opts: ["A. 对", "B. 错"],
                toast: "系统判卷：正确答案：对！\n因为MAQ最终总能找到证明自己有道理的逻辑。"
            },

            // --- 最后两题（开始收束） ---
            {
                label: "Chapter // 时光倒影",
                q: "如果有一天，工作很累，生活很烦，头发变少，体重变重，甚至我们都没现在年轻了。你最想保留什么？",
                opts: ["A. 钱", "B. 头发", "C. 现在陪在身边的人"],
                toast: "系统判卷：正确答案 C"
            },
            {
                label: "FINAL // 终极计算",
                q: "截至今天，你已获得以下成就：活到生日、工作努力、长得还行、运气不错、被MAQ喜欢。\n\n请问你接下来最该做什么？",
                opts: ["A. 继续升级打怪", "B. 好好照顾自己", "C. 开开心心过生日", "D. 以上全部"],
                toast: "" 
            }
        ];

        let currentQ = 0;

        function showToast(text) {
            if (!text) return;
            const toast = document.getElementById('toast');
            toast.innerText = text;
            
            gsap.killTweensOf(toast); 
            
            gsap.fromTo(toast, 
                { opacity: 0, y: 30, scale: 0.9 }, 
                { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: "back.out(1.2)" }
            );
            gsap.to(toast, { opacity: 0, y: -20, duration: 0.4, delay: 2.5, ease: "power2.in" });
        }

        function loadQuestion() {
            if (currentQ >= questions.length) {
                showFinal();
                return;
            }
            
            const panel = document.getElementById('panel');
            gsap.fromTo(panel, { opacity: 0, y: 15 }, { opacity: 1, y: 0, duration: 1, ease: "power2.out" });
            
            document.getElementById('q-label').innerText = questions[currentQ].label;
            document.getElementById('question-text').innerText = questions[currentQ].q;
            
            const optsContainer = document.getElementById('options-container');
            optsContainer.innerHTML = ''; 
            
            questions[currentQ].opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.onclick = () => {
                    triggerWarpDrive();
                    
                    if(questions[currentQ].toast) {
                        showToast(questions[currentQ].toast);
                    }
                    
                    currentQ++;
                    
                    let delayTime = questions[currentQ-1].toast ? 1800 : 800;
                    
                    gsap.to(panel, { opacity: 0, y: -15, duration: 0.4, onComplete: () => {
                        setTimeout(loadQuestion, delayTime); 
                    }});
                };
                optsContainer.appendChild(btn);
            });
        }

        function triggerWarpDrive() {
            gsap.to(window, { travelSpeed: 45, duration: 1.5, ease: "power2.in" });
            gsap.to(window, { travelSpeed: 1, duration: 2.5, delay: 1.5, ease: "power3.out" });
            
            gsap.to(camera, { fov: 100, duration: 1.5, ease: "power2.in", onUpdate: () => camera.updateProjectionMatrix() });
            gsap.to(camera, { fov: 60, duration: 2.5, delay: 1.5, ease: "power3.out", onUpdate: () => camera.updateProjectionMatrix() });
            
            gsap.to(nebulaMat, { opacity: 0.35, duration: 1.5, yoyo: true, repeat: 1 });
        }

        function showFinal() {
            const panel = document.getElementById('panel');
            
            document.getElementById('question-screen').style.display = 'none';
            document.getElementById('final-screen').style.display = 'block';
            
            gsap.fromTo(panel, { opacity: 0, scale: 0.95 }, { opacity: 1, scale: 1, duration: 1.5, ease: "power2.out" });
            
            gsap.to(window, { travelSpeed: 6, duration: 3, ease: "power1.inOut" });
            gsap.to(starMat.color, { r: 1, g: 0.6, b: 0.9, duration: 4 });
            document.querySelector('.hud-bottom').innerText = "STATUS: ARRIVED AT YOUR HEART";
        }

        loadQuestion();
    </script>
</body>
</html>
