<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boyfriend Qualification Exam // 年度测评</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        /* =========================================
           可爱 & 治愈系柔和玻璃 UI 美学
           ========================================= */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; height: 100%; 
            background-color: #fdfaf6; 
            font-family: 'Helvetica Neue', -apple-system, BlinkMacSystemFont, Arial, sans-serif; 
            overflow: hidden; 
        }

        /* 核心视频背景设置 */
        #bg-video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; 
            z-index: 0;
            filter: brightness(0.85); 
            transition: all 0.5s ease;
        }

        /* 交互主体区 */
        #main-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center; z-index: 10;
        }

        .app-frame {
            width: 100%; max-width: 402px; height: 874px; max-height: 100vh;
            padding: 30px 20px; display: flex; flex-direction: column; justify-content: center;
            position: relative;
        }

        /* =========================================
           终极杀手锏：启动封面 
           ========================================= */
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(253, 250, 246, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 999; /* 盖在最上面 */
            transition: opacity 0.8s ease;
        }

        .start-btn {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            border: none;
            color: #fff;
            padding: 20px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(255, 154, 158, 0.4);
            cursor: pointer;
            letter-spacing: 2px;
            animation: pulse-btn 2s infinite;
        }

        @keyframes pulse-btn {
            0% { transform: scale(1); box-shadow: 0 10px 25px rgba(255, 154, 158, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 15px 35px rgba(255, 154, 158, 0.6); }
            100% { transform: scale(1); box-shadow: 0 10px 25px rgba(255, 154, 158, 0.4); }
        }

        .start-title {
            color: #ff6b81;
            font-size: 1.8rem;
            margin-bottom: 40px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 2px;
        }

        /* 系统提示弹窗 (Toast) */
        .toast-message {
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            padding: 15px 25px; border-radius: 20px;
            color: #ff6b81; 
            font-size: 0.95rem; line-height: 1.6; letter-spacing: 1px; font-weight: bold;
            opacity: 0; pointer-events: none; z-index: 100; text-align: center;
            white-space: pre-wrap;
            box-shadow: 0 10px 30px rgba(255, 107, 129, 0.15);
            width: 85%;
        }

        /* 面板UI (初始隐藏，等点击开始后再显示) */
        .glass-panel {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.35) 0%, rgba(255, 240, 245, 0.15) 100%);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), inset 0 0 20px rgba(255, 255, 255, 0.4);
            padding: 40px 25px;
            position: relative;
            text-align: center;
            opacity: 0; /* 初始隐藏 */
            display: none; /* 初始隐藏 */
        }

        .question-label { color: #ff8eaa; font-size: 0.75rem; letter-spacing: 2px; margin-bottom: 20px; display: block; font-weight: bold; }
        .question { font-size: 1.25rem; font-weight: 500; line-height: 1.6; margin-bottom: 30px; color: #fff; letter-spacing: 1px; text-shadow: 0 2px 6px rgba(0, 0, 0, 0.25); }
        .options { display: flex; flex-direction: column; gap: 12px; }
        
        button.opt-btn { 
            background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.5); color: #fff; 
            padding: 16px; font-size: 0.95rem; font-weight: 500; letter-spacing: 1px; border-radius: 16px;
            cursor: pointer; transition: all 0.3s ease; text-align: left; text-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
        }
        
        button.opt-btn:hover, button.opt-btn:active { 
            background: rgba(255, 255, 255, 0.6); border-color: #fff; color: #ff6b81; text-shadow: none;
            box-shadow: 0 8px 20px rgba(255, 107, 129, 0.15); transform: translateY(-2px);
        }

        #final-screen { display: none; }
        .heart-icon { font-size: 4rem; color: #ff4757; margin-bottom: 10px; animation: breathe 1.5s infinite alternate ease-in-out; filter: drop-shadow(0 0 15px rgba(255, 71, 87, 0.4)); }
        @keyframes breathe { 0% { transform: scale(1); } 100% { transform: scale(1.15); } }
        .glow-text { color: #fff; text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2); font-size: 2.2rem; margin-top: 5px; font-weight: bold; margin-bottom: 20px; }
        .subtitle { font-size: 0.95rem; color: #fff; margin-top: 15px; line-height: 1.8; font-weight: 500; text-shadow: 0 1px 4px rgba(0,0,0,0.3); }

        .ambient-text { position: absolute; font-size: 0.65rem; color: rgba(255,255,255,0.7); letter-spacing: 2px; pointer-events: none; text-transform: uppercase; font-weight: bold; text-shadow: 0 1px 4px rgba(0,0,0,0.3); opacity: 0; }
        .hud-top { top: 30px; width: 100%; text-align: center; }
        .hud-bottom { bottom: 30px; width: 100%; text-align: center; }
    </style>
</head>
<body>

    <video id="bg-video" loop playsinline webkit-playsinline muted>
        <source src="bg.mp4" type="video/mp4">
    </video>

    <div id="start-screen">
        <div class="start-title">ZRY 专属<br>2026 年度资格测评</div>
        <button class="start-btn" onclick="startExam()">点击开启测评</button>
    </div>

    <div id="main-container">
        <div class="app-frame">
            
            <div class="ambient-text hud-top" id="hud-top">
                [ QUALIFICATION EXAM IN PROGRESS ]
            </div>
            
            <div id="toast" class="toast-message"></div>

            <div class="glass-panel" id="panel">
                <div id="question-screen">
                    <span class="question-label" id="q-label"></span>
                    <div class="question" id="question-text"></div>
                    <div class="options" id="options-container"></div>
                </div>

                <div id="final-screen">
                    <div class="heart-icon">❤</div>
                    <span class="question-label" style="color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.3);">EXAM_PASSED // 满分通过</span>
                    <h2 class="glow-text">🎂 生日快乐</h2>
                    <div class="subtitle" id="final-message">
                        恭喜你通过《男朋友年度资格考试》。<br>
                        本次考试得分：<strong style="color:#ffb8b8; font-size:1.2rem; text-shadow: none;">100分</strong>。<br>
                        <span style="font-size: 0.8rem; opacity: 0.9;">（其实不管答多少都是100分。）</span><br><br>
                        
                        <strong style="font-size: 1.15rem; line-height: 1.8;">
                            谢谢你出生<br>也谢谢你来到我的生活里
                        </strong><br><br>
                        
                        接下来的一年：<br>
                        希望你少加班，多多开心，<br>
                        身体健康，天天吃好睡好，<br>
                        天天幸福<br><br>
                        
                        <span style="font-size: 1.2rem; font-weight:bold; letter-spacing: 2px;">来自爱你的MAQ ❤️</span>
                    </div>
                </div>
            </div>

            <div class="ambient-text hud-bottom" id="hud-bottom">
                STATUS: ANALYZING RESPONSES
            </div>
        </div>
    </div>

    <script>
        // --- 核心突破：点击按钮后，强制加载并播放视频 ---
        function startExam() {
            const startScreen = document.getElementById('start-screen');
            const video = document.getElementById('bg-video');
            const panel = document.getElementById('panel');
            
            // 强制播放视频 (这一步是由用户真实点击触发的，绝不会被手机拦截)
            video.play().catch(function(error) {
                console.log("视频播放仍受限，可能是路径错误");
            });

            // 隐藏启动页，淡入 UI
            startScreen.style.opacity = '0';
            setTimeout(() => {
                startScreen.style.display = 'none';
                panel.style.display = 'block';
                
                // UI 淡入动画
                gsap.to(panel, { opacity: 1, y: 0, duration: 1, ease: "power2.out" });
                gsap.to("#hud-top", { opacity: 1, duration: 1 });
                gsap.to("#hud-bottom", { opacity: 1, duration: 1 });
                
                // 开始加载第一题
                loadQuestion();
            }, 800);
        }

        /* =========================================
           以下为题库逻辑与动画
           ========================================= */
        const questions = [
            {
                label: "Part 01 // 男友生存测试",
                q: "Q1. 如果MAQ和一只黑天鹅同时掉进水里，你会先救谁？",
                opts: ["A. 黑天鹅（保护野生动物）", "B. 安琪", "C. 先拍照发朋友圈"],
                toast: "系统判卷：正确答案是 C\n（解析：会拍到MAQ抱着黑天鹅不撒手的奇景。）"
            },
            {
                label: "Part 01 // 男友生存测试",
                q: "Q2. 以下哪个最危险？",
                opts: ["A. 半夜十二点的鬼", "B. 领导的微信消息", "C. MAQ说“没事”"],
                toast: "系统判卷：正确答案是 A\n（警告：因为出题人真的害怕鬼。）"
            },
            {
                label: "Part 01 // 男友生存测试",
                q: "Q3. MAQ说“你去忙吧”，真实含义是：",
                opts: ["A. 我真的希望你去忙", "B. 我随口一说", "C. 你最好别真去"],
                toast: "系统判卷：错误！\n正确答案：视当天心情而定。"
            },
            {
                label: "Part 01 // 男友生存测试",
                q: "Q4. 如果恋爱是一款游戏，ZRY属于：",
                opts: ["A. 新手教程", "B. 普通副本", "C. 地狱难度隐藏BOSS", "D. 通关奖励"],
                toast: "系统判卷：正确答案 C&D\n（因为ZRY是一个谜团又是一个奖励）"
            },
            {
                label: "Part 01 // 男友生存测试",
                q: "Q5. 以下哪个技能最有用？",
                opts: ["A. 年薪百万", "B. 八块腹肌", "C. 识别MAQ的表情变化"],
                toast: "系统判卷：正确答案 反正不是C\n（解析：MAQ的表情多好懂啊！）"
            },
            
            {
                label: "Part 02 // 恋爱理解测试",
                q: "Q6. 异地恋最大的BUG是什么？",
                opts: ["A. 距离", "B. 时间", "C. 想对方的时候只能发表情包"],
                toast: "系统判卷：正确答案 C（解析：好惨哦...）"
            },
            {
                label: "Part 02 // 恋爱理解测试",
                q: "Q7. 男朋友最大的作用是什么？",
                opts: ["A. 提供情绪价值", "B. 提供精神陪伴", "C. 提供身体价值", "D. 以上都是"],
                toast: "系统判卷：正确答案 D（解析：但听说男生过了25就是60，C可怎么办...）"
            },
            {
                label: "Part 02 // 恋爱理解测试",
                q: "Q8. 如果未来出现时光机，你最应该做什么？",
                opts: ["A. 买比特币", "B. 买彩票", "C. 早点认识MAQ"],
                toast: "系统判卷：正确答案 A&B\n（解析：登上福布斯富豪榜的话无论如何都会认识的。）"
            },

            {
                label: "Part 03 // 终极考验",
                q: "Q9. 为什么汽车/高铁要发明得这么快？",
                opts: ["A. 科技进步", "B. 国家发展", "C. 为了让ZRY快点回MAQ身边"],
                toast: "系统判卷：正确答案 C（解析：但汽车还是别开太快了！）"
            },
            {
                label: "Part 03 // 终极考验",
                q: "Q10. 以下哪项属于男朋友义务？",
                opts: ["A. 亲亲", "B. 抱抱", "C. 夸夸", "D. 全部"],
                toast: "系统判卷：正确答案 D"
            },
            {
                label: "Part 03 // 终极考验",
                q: "Q11. 为什么人一周只能休两天？",
                opts: ["A. 大自然守则", "B. 国家规定", "C. ACG对异地恋的恶意"],
                toast: "系统判卷：正确答案 C"
            },
            {
                label: "Part 03 // 终极考验",
                q: "Q12. 请判断：MAQ每天都很讲道理。",
                opts: ["A. 对", "B. 错"],
                toast: "系统判卷：正确答案：对！\n因为MAQ最终总能找到证明自己有道理的逻辑。"
            },

            {
                label: "Chapter // 时光倒影",
                q: "如果有一天，工作很累，生活很烦，头发变少，体重变重，甚至我们都没现在年轻了。你最想保留什么？",
                opts: ["A. 钱", "B. 头发", "C. 现在陪在身边的人"],
                toast: "系统判卷：正确答案 C"
            },
            {
                label: "FINAL // 终极计算",
                q: "截至今天，你已获得以下成就：活到生日、工作努力、长得还行、运气不错、被MAQ喜欢。\n\n请问你接下来最该做什么？",
                opts: ["A. 继续升级打怪", "B. 好好照顾自己", "C. 开开心心过生日", "D. 以上全部"],
                toast: ""
            }
        ];

        let currentQ = 0;

        function showToast(text) {
            if (!text) return;
            const toast = document.getElementById('toast');
            toast.innerText = text;
            
            gsap.killTweensOf(toast);
            gsap.fromTo(toast, { opacity: 0, y: 30, scale: 0.9 }, { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: "back.out(1.2)" });
            gsap.to(toast, { opacity: 0, y: -20, duration: 0.4, delay: 2.5, ease: "power2.in" });
        }

        function triggerVideoEffect() {
            const video = document.getElementById('bg-video');
            gsap.fromTo(video, { filter: "brightness(1.1)", scale: 1.05 }, { filter: "brightness(0.85)", scale: 1, duration: 1.5, ease: "power2.out" });
        }

        function loadQuestion() {
            if (currentQ >= questions.length) {
                showFinal();
                return;
            }
            
            const panel = document.getElementById('panel');
            gsap.fromTo(panel, { opacity: 0, y: 15 }, { opacity: 1, y: 0, duration: 1, ease: "power2.out" });
            
            document.getElementById('q-label').innerText = questions[currentQ].label;
            document.getElementById('question-text').innerText = questions[currentQ].q;
            
            const optsContainer = document.getElementById('options-container');
            optsContainer.innerHTML = ''; 
            
            questions[currentQ].opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn'; // 使用类名避免样式冲突
                btn.innerText = opt;
                btn.onclick = () => {
                    triggerVideoEffect();
                    
                    if(questions[currentQ].toast) {
                        showToast(questions[currentQ].toast);
                    }
                    
                    currentQ++;
                    
                    let delayTime = questions[currentQ-1].toast ? 1800 : 800;
                    
                    gsap.to(panel, { opacity: 0, y: -15, duration: 0.4, onComplete: () => {
                        setTimeout(loadQuestion, delayTime); 
                    }});
                };
                optsContainer.appendChild(btn);
            });
        }

        function showFinal() {
            const panel = document.getElementById('panel');
            
            document.getElementById('question-screen').style.display = 'none';
            document.getElementById('final-screen').style.display = 'block';
            document.getElementById('hud-bottom').innerText = "STATUS: ARRIVED AT YOUR HEART";
            
            gsap.fromTo(panel, { opacity: 0, scale: 0.95 }, { opacity: 1, scale: 1, duration: 1.5, ease: "power2.out" });
            gsap.to(document.getElementById('bg-video'), { filter: "brightness(1)", duration: 2 });
        }
    </script>
</body>
</html>
